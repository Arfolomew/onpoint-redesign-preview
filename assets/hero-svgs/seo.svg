<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Grid lines -->
  <line x1="80" y1="320" x2="340" y2="320" stroke="#ff6b6b" stroke-width="1" opacity="0.15"/>
  <line x1="80" y1="260" x2="340" y2="260" stroke="#ff6b6b" stroke-width="1" opacity="0.1"/>
  <line x1="80" y1="200" x2="340" y2="200" stroke="#ff6b6b" stroke-width="1" opacity="0.1"/>
  <line x1="80" y1="140" x2="340" y2="140" stroke="#ff6b6b" stroke-width="1" opacity="0.1"/>
  <line x1="80" y1="80" x2="340" y2="80" stroke="#ff6b6b" stroke-width="1" opacity="0.1"/>
  <!-- Rising chart line -->
  <polyline points="80,300 130,290 170,270 200,250 230,200 260,160 290,100 320,70" 
    stroke="#ff6b6b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Gradient fill under chart -->
  <path d="M80,300 L130,290 L170,270 L200,250 L230,200 L260,160 L290,100 L320,70 L320,320 L80,320 Z" 
    fill="url(#coralGrad)" opacity="0.12"/>
  <defs>
    <linearGradient id="coralGrad" x1="200" y1="70" x2="200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Data dots -->
  <circle cx="130" cy="290" r="4" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="200" cy="250" r="4" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="260" cy="160" r="5" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="320" cy="70" r="6" fill="#ff6b6b" opacity="0.9"/>
  <!-- Pulse ring on top dot -->
  <circle cx="320" cy="70" r="12" stroke="#ff6b6b" stroke-width="1.5" opacity="0.3"/>
  <!-- Magnifying glass -->
  <circle cx="150" cy="160" r="50" stroke="#e8d5b8" stroke-width="2.5" opacity="0.6"/>
  <line x1="186" y1="196" x2="220" y2="230" stroke="#e8d5b8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- "SEO" text inside lens -->
  <text x="150" y="166" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#e8d5b8" opacity="0.4">SEO</text>
  <!-- Arrow indicator -->
  <path d="M330,90 L342,60 L348,80" stroke="#e8d5b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
</svg>