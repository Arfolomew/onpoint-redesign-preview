<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Diamond/gem shape - main logo element -->
  <path d="M200 60 L300 160 L200 340 L100 160 Z" stroke="#f0d060" stroke-width="2" fill="rgba(240,208,96,0.06)"/>
  <!-- Inner facets -->
  <line x1="200" y1="60" x2="140" y2="160" stroke="#f0d060" stroke-width="1" opacity="0.25"/>
  <line x1="200" y1="60" x2="260" y2="160" stroke="#f0d060" stroke-width="1" opacity="0.25"/>
  <line x1="100" y1="160" x2="300" y2="160" stroke="#f0d060" stroke-width="1.5" opacity="0.2"/>
  <line x1="140" y1="160" x2="200" y2="340" stroke="#f0d060" stroke-width="1" opacity="0.15"/>
  <line x1="260" y1="160" x2="200" y2="340" stroke="#f0d060" stroke-width="1" opacity="0.15"/>
  <!-- Sparkle/shine marks -->
  <line x1="200" y1="40" x2="200" y2="52" stroke="#e8d5b8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="194" y1="46" x2="206" y2="46" stroke="#e8d5b8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Side sparkles -->
  <circle cx="80" cy="140" r="2" fill="#f0d060" opacity="0.4"/>
  <circle cx="320" cy="140" r="2" fill="#f0d060" opacity="0.4"/>
  <circle cx="330" cy="180" r="1.5" fill="#f0d060" opacity="0.3"/>
  <!-- Pen tool path around diamond -->
  <path d="M50 200 Q50 120, 100 100" stroke="#e8d5b8" stroke-width="1.5" opacity="0.2" stroke-dasharray="6 4"/>
  <path d="M350 200 Q350 120, 300 100" stroke="#e8d5b8" stroke-width="1.5" opacity="0.2" stroke-dasharray="6 4"/>
  <!-- Anchor points (pen tool) -->
  <rect x="46" y="196" width="8" height="8" fill="none" stroke="#e8d5b8" stroke-width="1.5" opacity="0.3"/>
  <rect x="96" y="96" width="8" height="8" fill="none" stroke="#e8d5b8" stroke-width="1.5" opacity="0.3"/>
  <rect x="346" y="196" width="8" height="8" fill="none" stroke="#e8d5b8" stroke-width="1.5" opacity="0.3"/>
  <rect x="296" y="96" width="8" height="8" fill="none" stroke="#e8d5b8" stroke-width="1.5" opacity="0.3"/>
  <!-- Color swatches at bottom -->
  <circle cx="160" cy="370" r="10" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="190" cy="370" r="10" fill="#4ecdc4" opacity="0.5"/>
  <circle cx="220" cy="370" r="10" fill="#a855f7" opacity="0.5"/>
  <circle cx="250" cy="370" r="10" fill="#f0d060" opacity="0.7"/>
  <!-- Highlight facet -->
  <path d="M200 60 L260 160 L200 160 Z" fill="#f0d060" opacity="0.06"/>
</svg>