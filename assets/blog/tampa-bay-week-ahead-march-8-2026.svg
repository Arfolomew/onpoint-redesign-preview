<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#1a6b3c"/>
  <rect width="1200" height="800" fill="url(#grain)" opacity="0.08"/>
  <defs>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4"/></filter>
  </defs>
  <!-- Four leaf clover -->
  <g transform="translate(600,350)" fill="#2d9e5e">
    <ellipse cx="-45" cy="-45" rx="55" ry="65" transform="rotate(-45,-45,-45)"/>
    <ellipse cx="45" cy="-45" rx="55" ry="65" transform="rotate(45,45,-45)"/>
    <ellipse cx="-45" cy="45" rx="55" ry="65" transform="rotate(45,-45,45)"/>
    <ellipse cx="45" cy="45" rx="55" ry="65" transform="rotate(-45,45,45)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="20" fill="#1a6b3c"/>
    <!-- Stem -->
    <path d="M0 70 Q10 120 -5 180" stroke="#1a5c30" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Decorative shamrocks -->
  <g fill="#2d9e5e" opacity="0.3">
    <g transform="translate(150,200) scale(0.3)"><ellipse cx="-40" cy="-40" rx="45" ry="55" transform="rotate(-45,-40,-40)"/><ellipse cx="40" cy="-40" rx="45" ry="55" transform="rotate(45,40,-40)"/><ellipse cx="0" cy="40" rx="45" ry="55"/></g>
    <g transform="translate(1050,150) scale(0.25)"><ellipse cx="-40" cy="-40" rx="45" ry="55" transform="rotate(-45,-40,-40)"/><ellipse cx="40" cy="-40" rx="45" ry="55" transform="rotate(45,40,-40)"/><ellipse cx="0" cy="40" rx="45" ry="55"/></g>
    <g transform="translate(200,600) scale(0.2)"><ellipse cx="-40" cy="-40" rx="45" ry="55" transform="rotate(-45,-40,-40)"/><ellipse cx="40" cy="-40" rx="45" ry="55" transform="rotate(45,40,-40)"/><ellipse cx="0" cy="40" rx="45" ry="55"/></g>
    <g transform="translate(1000,550) scale(0.35)"><ellipse cx="-40" cy="-40" rx="45" ry="55" transform="rotate(-45,-40,-40)"/><ellipse cx="40" cy="-40" rx="45" ry="55" transform="rotate(45,40,-40)"/><ellipse cx="0" cy="40" rx="45" ry="55"/></g>
  </g>
  <!-- Text -->
  <text x="600" y="640" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#fff" letter-spacing="6" text-transform="uppercase">TAMPA BAY THIS WEEK</text>
  <text x="600" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.7)" letter-spacing="4">ST. PATRICK'S · BEER FESTS · SPRING TRAINING</text>
</svg>
