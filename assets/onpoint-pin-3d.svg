<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Body gradient: warm cream, brighter upper-left -->
    <radialGradient id="bodyGrad" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#FBF4EA"/>
      <stop offset="35%" stop-color="#F0E2CC"/>
      <stop offset="70%" stop-color="#DCC8A8"/>
      <stop offset="100%" stop-color="#C8AE8A"/>
    </radialGradient>

    <!-- Strong specular highlight blob -->
    <radialGradient id="spec" cx="32%" cy="22%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Lower-right shadow overlay -->
    <radialGradient id="shadow" cx="75%" cy="75%" r="60%">
      <stop offset="0%" stop-color="#8B7355" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#8B7355" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8B7355" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner bevel: dark shadow ring visible inside hole -->
    <!-- Top of inner wall is shadowed, bottom catches light -->
    <linearGradient id="bevelTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A08060"/>
      <stop offset="100%" stop-color="#D4BE9C"/>
    </linearGradient>

    <linearGradient id="bevelSide" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#C8AD8A"/>
      <stop offset="50%" stop-color="#9C7E5A"/>
      <stop offset="100%" stop-color="#B89870"/>
    </linearGradient>

    <!-- Pin outline path -->
    <!-- Mask: pin with hole -->
    <mask id="pinHole">
      <rect width="200" height="280" fill="black"/>
      <path d="M100 258 C100 258 27 154 27 98 C27 57.7 59.7 25 100 25 C140.3 25 173 57.7 173 98 C173 154 100 258 100 258Z" fill="white"/>
      <circle cx="100" cy="93" r="34" fill="black"/>
    </mask>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="8" flood-color="#000000" flood-opacity="0.7"/>
    </filter>

    <!-- Bevel ring mask -->
    <mask id="bevelRing">
      <rect width="200" height="280" fill="black"/>
      <circle cx="100" cy="93" r="44" fill="white"/>
      <circle cx="100" cy="93" r="34" fill="black"/>
    </mask>
  </defs>

  <g filter="url(#dropShadow)">
  <!-- LAYER 1: Inner bevel ring (drawn first, behind main body edges) -->
  <!-- This shows the "thickness" inside the hole -->
  <circle cx="100" cy="93" r="44" fill="url(#bevelSide)" mask="url(#bevelRing)"/>

  <!-- Bevel shadow on top-right inner edge -->
  <ellipse cx="108" cy="85" rx="42" ry="42" fill="none" stroke="#7A6040" stroke-width="4" opacity="0.35" mask="url(#bevelRing)"/>

  <!-- Bevel highlight on bottom-left inner edge -->
  <ellipse cx="92" cy="100" rx="40" ry="40" fill="none" stroke="#EAD8BE" stroke-width="3" opacity="0.5" mask="url(#bevelRing)"/>

  <!-- LAYER 2: Main pin body -->
  <path d="M100 258 C100 258 27 154 27 98 C27 57.7 59.7 25 100 25 C140.3 25 173 57.7 173 98 C173 154 100 258 100 258Z"
        fill="url(#bodyGrad)" mask="url(#pinHole)"/>

  <!-- LAYER 3: Shadow overlay (lower-right darkening) -->
  <path d="M100 258 C100 258 27 154 27 98 C27 57.7 59.7 25 100 25 C140.3 25 173 57.7 173 98 C173 154 100 258 100 258Z"
        fill="url(#shadow)" mask="url(#pinHole)"/>

  <!-- LAYER 4: Specular highlight (upper-left) -->
  <path d="M100 258 C100 258 27 154 27 98 C27 57.7 59.7 25 100 25 C140.3 25 173 57.7 173 98 C173 154 100 258 100 258Z"
        fill="url(#spec)" mask="url(#pinHole)"/>
  </g>
</svg>
