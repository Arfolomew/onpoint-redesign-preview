<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | On Point</title>
    <meta name="theme-color" content="#1a1a2e">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1a1a2e;
            --white: #ffffff;
            --teal: #4ecdc4;
            --coral: #ff6b6b;
            --yellow: #f0d060;
            --purple: #a855f7;
        }

        body {
            min-height: 100vh;
            background: var(--bg-dark);
            color: var(--white);
            font-family: 'General Sans', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .code {
            font-family: 'Clash Display', sans-serif;
            font-size: clamp(6rem, 20vw, 14rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--teal), var(--coral), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: glitch 3s infinite;
        }

        .message {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.75rem;
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--yellow);
            letter-spacing: 2px;
            margin-bottom: 2.5rem;
            opacity: 0.8;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2rem;
            background: var(--yellow);
            color: var(--bg-dark);
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 10px;
            text-decoration: none;
            transition: transform 0.15s ease, background 0.2s ease;
        }

        .btn:hover {
            background: var(--teal);
        }

        .btn:active {
            transform: scale(0.96) translateY(1px);
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        /* Grain */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px;
            animation: grainShift 0.5s steps(4) infinite;
        }

        @keyframes grainShift {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2%, -3%); }
            50% { transform: translate(3%, 1%); }
            75% { transform: translate(-1%, 3%); }
            100% { transform: translate(2%, -2%); }
        }

        @keyframes glitch {
            0%, 90%, 100% { filter: none; }
            92% { filter: hue-rotate(90deg); transform: translateX(-2px); }
            94% { filter: hue-rotate(0deg); transform: translateX(2px); }
            96% { filter: hue-rotate(-90deg); transform: translateX(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .grain, .code { animation: none; }
        }
    </style>
</head>
<body>
    <canvas id="grid" aria-hidden="true"></canvas>
    <div class="grain" aria-hidden="true"></div>
    
    <div class="content">
        <div class="code">404</div>
        <p class="message">This page vanished into the pixel void.</p>
        <p class="tagline">NO MAGICK HERE</p>
        <a href="index.html" class="btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to On Point
        </a>
    </div>

    <script>
        const canvas = document.getElementById('grid');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const colors = ['#4ecdc4', '#ff6b6b', '#a855f7', '#f0d060', '#6366f1'];

        function resize() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        const size = 24;
        const w = () => window.innerWidth;
        const h = () => window.innerHeight;
        const cells = [];

        for (let i = 0; i < 80; i++) {
            cells.push({
                x: Math.floor(Math.random() * Math.ceil(w() / size)) * size,
                y: Math.floor(Math.random() * Math.ceil(h() / size)) * size,
                color: colors[Math.floor(Math.random() * colors.length)],
                alpha: Math.random() * 0.5,
                speed: 0.005 + Math.random() * 0.015,
                phase: Math.random() * Math.PI * 2
            });
        }

        let t = 0;
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function draw() {
            ctx.clearRect(0, 0, w(), h());
            t += 0.016;
            cells.forEach(c => {
                const a = c.alpha * (0.2 + 0.8 * Math.abs(Math.sin(t * c.speed * 60 + c.phase)));
                ctx.fillStyle = c.color;
                ctx.globalAlpha = a;
                ctx.fillRect(c.x, c.y, size - 1, size - 1);
            });
            ctx.globalAlpha = 1;
            if (!reducedMotion) requestAnimationFrame(draw);
        }

        if (reducedMotion) {
            cells.forEach(c => {
                ctx.fillStyle = c.color;
                ctx.globalAlpha = c.alpha * 0.4;
                ctx.fillRect(c.x, c.y, size - 1, size - 1);
            });
        } else {
            draw();
        }
    </script>
</body>
</html>
