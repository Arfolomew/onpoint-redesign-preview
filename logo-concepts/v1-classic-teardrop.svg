<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <clipPath id="pin-clip">
      <!-- Classic teardrop map pin -->
      <path d="M200 460 C200 460 80 280 80 180 C80 113.7 133.7 60 200 60 C266.3 60 320 113.7 320 180 C320 280 200 460 200 460Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#FFFEF5"/>

  <!-- Pin body - dark fill -->
  <path d="M200 460 C200 460 80 280 80 180 C80 113.7 133.7 60 200 60 C266.3 60 320 113.7 320 180 C320 280 200 460 200 460Z"
        fill="#111114" stroke="none"/>

  <!-- Power symbol - arc -->
  <path d="M155 155 A55 55 0 1 0 245 155"
        fill="none" stroke="#f0e6d3" stroke-width="12" stroke-linecap="round"/>

  <!-- Power symbol - vertical line -->
  <line x1="200" y1="120" x2="200" y2="175"
        stroke="#f0e6d3" stroke-width="12" stroke-linecap="round"/>

  <!-- Label -->
  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999" letter-spacing="1">CLASSIC TEARDROP</text>
</svg>
