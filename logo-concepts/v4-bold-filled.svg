<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="pin-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#111114"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#FFFEF5"/>

  <!-- Coral shadow offset (chromatic hint, subtle) -->
  <path d="M204 458
           C204 458 92 280 92 184
           C92 117.7 143.7 66 207 66
           C270.3 66 322 117.7 322 184
           C322 280 204 458 204 458Z"
        fill="#ff6b6b" opacity="0.25"/>

  <!-- Main pin body -->
  <path d="M200 455
           C200 455 88 278 88 182
           C88 115.7 139.7 64 203 64
           C266.3 64 318 115.7 318 182
           C318 278 200 455 200 455Z"
        fill="url(#pin-grad)"/>

  <!-- Thick bold power arc -->
  <path d="M157 157 A53 53 0 1 0 243 157"
        fill="none" stroke="#f0e6d3" stroke-width="14" stroke-linecap="round"/>

  <!-- Bold vertical line -->
  <line x1="200" y1="122" x2="200" y2="177"
        stroke="#f0e6d3" stroke-width="14" stroke-linecap="round"/>

  <!-- Small dot at pin tip for emphasis -->
  <circle cx="200" cy="455" r="0" fill="#ff6b6b"/>

  <!-- Label -->
  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999" letter-spacing="1">BOLD + SUBTLE CHROMATIC</text>
</svg>
